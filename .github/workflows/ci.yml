name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  test-dependencies:
    name: Check running without dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv with Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.11"
          python-version: "3.12"

      - name: Install aristaproto
        working-directory: ./aristaproto
        run: uv sync --locked

      - name: Install aristaproto_compiler
        working-directory: ./aristaproto_compiler
        run: uv sync --locked

      - name: Compile test files
        working-directory: ./aristaproto_compiler
        shell: bash
        run: uv run poe generate

      - name: Move compiled files to aristaproto
        shell: bash
        run: cp -r aristaproto_compiler/tests/outputs aristaproto/tests

      - name: Execute test suite
        working-directory: ./aristaproto
        run: uv run poe test


      - name: Add Pydantic
        working-directory: ./aristaproto
        run: uv sync --locked --extra=pydantic

      - name: Execute test suite
        working-directory: ./aristaproto
        run: uv run poe test


      - name: Add all but Pydantic
        working-directory: ./aristaproto
        run: uv sync --locked --extra=grpclib --extra=grpcio --extra=protobuf

      - name: Execute test suite
        working-directory: ./aristaproto
        run: uv run poe test


      - name: Add grpclib
        working-directory: ./aristaproto
        run: uv sync --locked --extra=grpclib

      - name: Execute test suite
        working-directory: ./aristaproto
        run: uv run poe test


      - name: Add all but grpclib
        working-directory: ./aristaproto
        run: uv sync --locked --extra=pydantic --extra=grpcio --extra=protobuf

      - name: Execute test suite
        working-directory: ./aristaproto
        run: uv run poe test


      - name: Add grpcio
        working-directory: ./aristaproto
        run: uv sync --locked --extra=grpcio

      - name: Execute test suite
        working-directory: ./aristaproto
        run: uv run poe test


      - name: Add all but grpcio
        working-directory: ./aristaproto
        run: uv sync --locked --extra=pydantic --extra=grpclib --extra=protobuf

      - name: Execute test suite
        working-directory: ./aristaproto
        run: uv run poe test


      - name: Add protobuf
        working-directory: ./aristaproto
        run: uv sync --locked --extra=protobuf

      - name: Execute test suite
        working-directory: ./aristaproto
        run: uv run poe test


      - name: Add all but protobuf
        working-directory: ./aristaproto
        run: uv sync --locked --extra=pydantic --extra=grpclib --extra=grpcio

      - name: Execute test suite
        working-directory: ./aristaproto
        run: uv run poe test

  tests:
    name: ${{ matrix.os }} / ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [Ubuntu, MacOS, Windows]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6

      - name: Install uv with Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.11"
          python-version: ${{ matrix.python-version }}

      - name: Install aristaproto
        working-directory: ./aristaproto
        run: uv sync --locked --all-extras --all-groups

      - name: Install aristaproto_compiler
        working-directory: ./aristaproto_compiler
        run: uv sync --locked --all-extras --all-groups

      - name: Test aristaproto_compiler
        working-directory: ./aristaproto_compiler
        shell: bash
        run: uv run poe test

      - name: Compile test files
        working-directory: ./aristaproto_compiler
        shell: bash
        run: uv run poe generate

      - name: Move compiled files to aristaproto
        shell: bash
        run: cp -r aristaproto_compiler/tests/outputs aristaproto/tests

      - name: Execute test suite
        working-directory: ./aristaproto
        shell: bash
        run: uv run poe test

      # Run conformance test on all Ubuntu and MacOS versions
      - name: Install Node.js
        if: matrix.os == 'Ubuntu' || matrix.os == 'MacOS'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install conformance runner
        if: matrix.os == 'Ubuntu' || matrix.os == 'MacOS'
        run: npm install -g protobuf-conformance@33.1.0

      - name: Create test script
        if: matrix.os == 'Ubuntu' || matrix.os == 'MacOS'
        shell: bash
        working-directory: ./aristaproto
        run: |
          echo '#!/bin/bash' > script.sh
          echo 'python -m tests.conformance.main' >> script.sh
          chmod +x script.sh

      - name: Run conformance tests
        if: matrix.os == 'Ubuntu' || matrix.os == 'MacOS'
        working-directory: ./aristaproto
        run: |
          uv run conformance_test_runner --failure_list tests/conformance/failing_tests.txt ./script.sh
