name: Code Quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  code-quality:
    name: Check code formatting and typechecking
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pre-commit/action@v3.0.1

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.11.11"
        python-version: "3.10"

    - name: Install aristaproto
      working-directory: ./aristaproto
      run: uv sync --locked --all-extras --all-groups

    - name: Install aristaproto_compiler
      working-directory: ./aristaproto_compiler
      run: uv sync --locked --all-extras --all-groups

    - name: Pyright
      working-directory: ./aristaproto
      shell: bash
      run: uv run poe typecheck

    - name: Pyright
      working-directory: ./aristaproto_compiler
      shell: bash
      run: uv run poe typecheck
